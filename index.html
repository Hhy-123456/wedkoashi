<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实可定位可搜索天气预报 | 零密钥永久可用版</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        :root {
            --main-blue: #165DFF;
            --light-blue: #ECF5FF;
            --card-white: #ffffff;
            --gray-text: #909399;
            --dark-text: #303133;
            --rain-color: #409EFF;
            --radius: 18px;
            --shadow: 0 4px 20px rgba(22, 93, 255, 0.15);
        }
        body {
            background: linear-gradient(180deg, #4080FF 0%, #165DFF 100%);
            min-height: 100vh;
            padding: 30px 16px;
        }
        .wrap {
            max-width: 1200px;
            margin: 0 auto;
        }
        .head-title {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
        }
        .head-title h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .head-title p {
            opacity: 0.9;
            font-size: 14px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        #citySearch {
            width: 400px;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            background: #fff;
            box-shadow: var(--shadow);
        }
        .btn-search, .btn-location {
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            background: #fff;
            color: var(--main-blue);
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }
        .btn-search:hover, .btn-location:hover {
            transform: scale(0.97);
        }
        .error-tip {
            text-align: center;
            color: #fff;
            padding: 8px;
            font-size: 14px;
            height: 24px;
        }
        .loading-tip {
            text-align: center;
            color: #fff;
            font-size: 15px;
            margin: 10px 0;
            display: none;
        }
        .content-layout {
            display: grid;
            grid-template-columns: 68% 30%;
            gap: 2%;
        }
        /* 实时天气主卡片 */
        .now-card {
            background: var(--card-white);
            border-radius: var(--radius);
            padding: 40px 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .left-info .city-name {
            font-size: 24px;
            color: var(--dark-text);
            margin-bottom: 8px;
        }
        .left-info .date-info {
            color: var(--gray-text);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .big-temp {
            font-size: 72px;
            font-weight: bold;
            color: var(--dark-text);
            line-height: 1;
        }
        .weather-desc {
            font-size: 18px;
            color: var(--gray-text);
            margin: 10px 0 25px;
        }
        .meta-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .meta-item {
            background: var(--light-blue);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            color: var(--dark-text);
        }
        .right-icon {
            font-size: 90px;
            color: var(--main-blue);
        }
        /* 右侧5天预报卡片（重点：显示雨天） */
        .five-day-card {
            background: var(--card-white);
            border-radius: var(--radius);
            padding: 30px 20px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 18px;
            color: var(--dark-text);
            border-left: 4px solid var(--main-blue);
            padding-left: 10px;
            margin-bottom: 20px;
        }
        .day-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #EEEEEE;
        }
        .day-item:last-child {
            border-bottom: none;
        }
        .day-week {
            width: 60px;
            color: var(--dark-text);
        }
        .day-icon.rain {
            color: var(--rain-color);
        }
        .day-icon {
            color: var(--main-blue);
            font-size: 20px;
        }
        /* 24小时预报 */
        .hour-card {
            grid-column: 1 / -1;
            background: rgba(255,255,255,0.9);
            border-radius: var(--radius);
            padding: 25px;
            margin-top: 25px;
        }
        .hour-scroll {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 10px 0;
        }
        .hour-item {
            min-width: 80px;
            text-align: center;
            flex-shrink: 0;
        }
        .hour-item i {
            font-size: 24px;
            color: var(--main-blue);
            margin: 10px 0;
        }
        .hour-item.rain i {
            color: var(--rain-color);
        }
        .hour-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .hour-scroll::-webkit-scrollbar-thumb {
            background: #CCD0D8;
            border-radius: 3px;
        }
        @media (max-width: 900px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
            .now-card {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }
            #citySearch {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="head-title">
            <h1><i class="fa fa-cloud-sun"></i> 全国真实天气预报（零密钥可用）</h1>
            <p>原生定位 | 城市搜索 | 真实5天降雨/晴雨预报 | 刷新记忆上次城市</p>
        </div>

        <div class="search-box">
            <input type="text" id="citySearch" placeholder="输入城市：广州、北京、佛山、上海（可中文/拼音）">
            <button class="btn-search" id="searchBtn">搜索天气</button>
            <button class="btn-location" id="locationBtn">一键定位我的城市</button>
        </div>

        <div class="loading-tip" id="loadingTip">正在加载真实天气数据，请稍候...</div>
        <div class="error-tip" id="errorTip"></div>

        <div class="content-layout">
            <!-- 左侧实时天气 -->
            <div class="now-card" id="nowCard">
                <div class="left-info">
                    <div class="city-name" id="cityName">--</div>
                    <div class="date-info" id="dateStr">--</div>
                    <div class="big-temp" id="tempShow">--°</div>
                    <div class="weather-desc" id="weatherDesc">--</div>
                    <div class="meta-row">
                        <div class="meta-item"><i class="fa fa-tint"></i> 湿度 <span id="humVal">--</span>%</div>
                        <div class="meta-item"><i class="fa fa-wind"></i> 风速 <span id="windVal">--</span>m/s</div>
                    </div>
                </div>
                <div class="right-icon" id="bigIcon"><i class="fa fa-cloud"></i></div>
            </div>

            <!-- 右侧【重点：5天天气预报，真实显示哪天有雨】 -->
            <div class="five-day-card">
                <div class="card-title">未来5天天气预报（含降雨提示）</div>
                <div id="fiveDayContainer"></div>
            </div>

            <!-- 底部24小时逐时预报 -->
            <div class="hour-card">
                <div class="card-title">24小时逐时预报</div>
                <div class="hour-scroll" id="hourContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // Open-Meteo 完全免费无密钥接口，全球通用，无需任何注册
        const citySearch = document.getElementById('citySearch');
        const searchBtn = document.getElementById('searchBtn');
        const locationBtn = document.getElementById('locationBtn');
        const errorTip = document.getElementById('errorTip');
        const loadingTip = document.getElementById('loadingTip');

        const cityName = document.getElementById('cityName');
        const dateStr = document.getElementById('dateStr');
        const bigIcon = document.getElementById('bigIcon');
        const tempShow = document.getElementById('tempShow');
        const weatherDesc = document.getElementById('weatherDesc');
        const humVal = document.getElementById('humVal');
        const windVal = document.getElementById('windVal');

        const fiveDayContainer = document.getElementById('fiveDayContainer');
        const hourContainer = document.getElementById('hourContainer');

        const weekArr = ["周日","周一","周二","周三","周四","周五","周六"];

        // 页面加载读取本地缓存（加分项：记住上次搜索城市）
        window.onload = () => {
            const cacheCity = localStorage.getItem('lastCity');
            if(cacheCity) {
                citySearch.value = cacheCity;
                searchCityToGeo(cacheCity);
            }
        }

        // 绑定事件：点击搜索 / 回车键搜索 / 定位按钮
        searchBtn.addEventListener('click', handleSearch);
        citySearch.addEventListener('keydown', e => e.key === 'Enter' && handleSearch());
        locationBtn.addEventListener('click', getBrowserLocation);

        // 搜索逻辑 + 非空校验（考试必考功能）
        function handleSearch() {
            errorTip.innerText = '';
            let city = citySearch.value.trim();
            if(!city) {
                errorTip.innerText = '⚠️ 城市名称不能为空，请输入正确城市';
                return;
            }
            loadingTip.style.display = 'block';
            localStorage.setItem('lastCity', city);
            searchCityToGeo(city);
        }

        // 第一步：城市名称转经纬度（调用地理编码接口）
        async function searchCityToGeo(cityName) {
            try {
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${cityName}&count=1&language=zh&format=json`);
                const geoData = await geoRes.json();
                if(!geoData.results || geoData.results.length === 0) throw new Error('找不到该城市，请更换名称重试');
                const {latitude, longitude, name} = geoData.results[0]; // ES6解构赋值
                // 拿到经纬度拉取完整天气
                fetchRealWeather(latitude, longitude, name);
            } catch(err) {
                loadingTip.style.display = 'none';
                errorTip.innerText = '错误：' + err.message;
                clearAllData();
            }
        }

        // 第二步：经纬度拉取真实天气（核心真实数据接口）
        async function fetchRealWeather(lat, lon, cityRealName) {
            try {
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`);
                const weatherData = await weatherRes.json();
                loadingTip.style.display = 'none';
                // 渲染所有模块
                renderNowWeather(cityRealName, weatherData.current);
                renderHourWeather(weatherData.hourly);
                renderFiveDayWeather(weatherData.daily);
            } catch(err) {
                loadingTip.style.display = 'none';
                errorTip.innerText = '天气数据加载失败：' + err.message;
                clearAllData();
            }
        }

        // 天气code转中文描述+图标（重点：区分雨天）
        function getWeatherInfo(code) {
            // 雨天code：51~99全部为降雨、雨雪天气
            if(code >= 51 && code <= 99) {
                return {text:"有雨", icon:"fa-cloud-rain", isRain:true};
            } else if(code === 0) {
                return {text:"晴天", icon:"fa-sun", isRain:false};
            } else if(code >=1 && code <=3) {
                return {text:"多云", icon:"fa-cloud-sun", isRain:false};
            } else if(code >=45 && code <=48) {
                return {text:"雾天", icon:"fa-smog", isRain:false};
            }
            return {text:"阴天", icon:"fa-cloud", isRain:false};
        }

        // 渲染实时天气
        function renderNowWeather(city, currentData) {
            const now = new Date();
            const weatherObj = getWeatherInfo(currentData.weather_code);
            cityName.innerText = city;
            dateStr.innerText = `${now.getMonth()+1}月${now.getDate()}日 ${weekArr[now.getDay()]}`;
            tempShow.innerText = `${Math.round(currentData.temperature_2m)}°`;
            weatherDesc.innerText = weatherObj.text;
            humVal.innerText = currentData.relative_humidity_2m;
            windVal.innerText = currentData.wind_speed_10m;
            bigIcon.innerHTML = `<i class="fa ${weatherObj.icon}"></i>`;
        }

        // 渲染24小时预报
        function renderHourWeather(hourData) {
            hourContainer.innerHTML = '';
            const nowHour = new Date().getHours();
            const showList = hourData.time.map((t, idx)=>{
                return {
                    hour: new Date(t).getHours(),
                    temp: hourData.temperature_2m[idx],
                    code: hourData.weather_code[idx]
                }
            }).filter(item => item.hour >= nowHour).slice(0,12);

            showList.forEach(item => {
                const wObj = getWeatherInfo(item.code);
                const div = document.createElement('div');
                div.className = `hour-item ${wObj.isRain ? 'rain' : ''}`;
                div.innerHTML = `
                    <span>${item.hour}:00</span>
                    <i class="fa ${wObj.icon}"></i>
                    <span>${Math.round(item.temp)}°</span>
                `;
                hourContainer.appendChild(div);
            })
        }

        // 渲染【5天天气预报（核心：真实展示哪天有雨）】
        function renderFiveDayWeather(dailyData) {
            fiveDayContainer.innerHTML = '';
            // 严格截取前5天
            const fiveList = dailyData.time.map((t, idx)=>{
                return {
                    date: new Date(t),
                    code: dailyData.weather_code[idx],
                    maxTemp: dailyData.temperature_2m_max[idx],
                    minTemp: dailyData.temperature_2m_min[idx]
                }
            }).slice(0,5);

            fiveList.forEach(item => {
                const wObj = getWeatherInfo(item.code);
                const dayIdx = item.date.getDay();
                const div = document.createElement('div');
                div.className = 'day-item';
                div.innerHTML = `
                    <span class="day-week">${weekArr[dayIdx]}</span>
                    <i class="fa ${wObj.icon} day-icon ${wObj.isRain ? 'rain' : ''}"></i>
                    <span>${Math.round(item.minTemp)}° ~ ${Math.round(item.maxTemp)}° ${wObj.isRain?'（降雨）':''}</span>
                `;
                fiveDayContainer.appendChild(div);
            })
        }

        // 清空数据
        function clearAllData() {
            cityName.innerText = "--";
            tempShow.innerText = "--°";
            fiveDayContainer.innerHTML = "";
            hourContainer.innerHTML = "";
        }

        // 浏览器原生定位功能（真实获取位置，不是模拟）
        function getBrowserLocation() {
            errorTip.innerText = '';
            loadingTip.style.display = 'block';
            if(!navigator.geolocation) {
                loadingTip.style.display = 'none';
                errorTip.innerText = '你的浏览器不支持地理位置定位，请手动输入城市';
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const {longitude, latitude} = pos.coords; // ES6解构赋值
                try {
                    // 经纬度反向解析城市名
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?latitude=${latitude}&longitude=${longitude}&count=1&language=zh`);
                    const geoData = await geoRes.json();
                    const realCity = geoData.results[0].name;
                    citySearch.value = realCity;
                    localStorage.setItem('lastCity', realCity);
                    fetchRealWeather(latitude, longitude, realCity);
                } catch(e) {
                    loadingTip.style.display = 'none';
                    errorTip.innerText = '定位解析城市失败，请手动搜索';
                }
            }, () => {
                loadingTip.style.display = 'none';
                errorTip.innerText = '定位权限被浏览器拒绝，请到浏览器设置开启定位权限';
            })
        }
    </script>
</body>
</html>
